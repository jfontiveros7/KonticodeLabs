<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovaStack Labs – AI Agent</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
</head>

<body class="bg-gray-900 text-white">
    <header class="p-6 flex justify-between items-center">
        <h1 class="text-2xl font-bold">NovaStack Labs</h1>
        <button id="toggleDark" class="px-4 py-2 bg-gray-700 rounded">Toggle Dark</button>
    </header>

    <section class="text-center mt-20" data-aos="fade-up">
        <h2 class="text-5xl font-bold mb-4">Your AI Agent, Supercharged</h2>
        <p class="text-gray-300 mb-8">Automate tasks, build workflows, and scale your business.</p>
        <a href="/agent" class="px-6 py-3 bg-blue-600 rounded text-white">Launch Agent</a>
    </section>

    <footer class="mt-20 p-6 text-center text-gray-400">
        © 2026 NovaStack Labs
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init()</script>

    <script>
        document.getElementById("toggleDark").onclick = () =>
            document.documentElement.classList.toggle("dark");
    </script>
</body>
</html>
