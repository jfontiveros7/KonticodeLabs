<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - Konticode Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HXPJGHXTBV"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-HXPJGHXTBV');
    </script>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center px-4 sm:px-6">
    <div class="w-full max-w-md bg-gray-900 border border-gray-800 rounded-2xl p-6 sm:p-8">
        <div class="text-center mb-6">
            <div class="w-14 h-14 mx-auto rounded-2xl bg-indigo-600/20 flex items-center justify-center mb-4">
                <i class="fas fa-lock text-indigo-300"></i>
            </div>
            <h1 class="text-xl sm:text-2xl font-black">Admin Access</h1>
            <p class="text-gray-400 text-sm mt-2">Sign in with admin credentials to continue.</p>
        </div>

        {% if error %}
        <div class="mb-4 bg-red-500/15 border border-red-500/30 text-red-300 text-sm rounded-lg px-4 py-3">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/admin/login" class="space-y-4">
            <div>
                <label for="username" class="block text-sm text-gray-400 mb-1.5">Username</label>
                <input id="username" name="username" type="text" required
                       class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-indigo-500" />
            </div>
            <div>
                <label for="password" class="block text-sm text-gray-400 mb-1.5">Password</label>
                <input id="password" name="password" type="password" required
                       class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-indigo-500" />
            </div>
            <button type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl transition-colors">
                Sign In
            </button>
        </form>

        <p class="text-xs text-gray-500 mt-5 text-center">Protected area for authorized admin only.</p>
    </div>
</body>
</html>
