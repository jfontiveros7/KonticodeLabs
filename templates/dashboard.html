<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <script>
    // Load theme from localStorage
    if (
        localStorage.theme === 'dark' ||
        (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)
    ) {
        document.documentElement.classList.add('dark')
    } else {
        document.documentElement.classList.remove('dark')
    }

    function toggleTheme() {
        const html = document.documentElement
        const isDark = html.classList.toggle('dark')
        localStorage.theme = isDark ? 'dark' : 'light'
    }

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – NovaStack Labs</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-100 h-screen flex">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white shadow-lg p-6">
        <h2 class="text-2xl font-bold text-indigo-600 mb-6">Dashboard</h2>

        <nav class="space-y-4">
            <a href="/" class="block text-gray-700 hover:text-indigo-600">🏠 Landing</a>
            <a href="/agent" class="block text-gray-700 hover:text-indigo-600">🤖 Agent</a>
            <a href="/dashboard" class="block text-indigo-600 font-semibold">📊 Dashboard</a>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 p-8 overflow-y-auto">

        <!-- TOP BAR -->
        <button onclick="toggleTheme()" 
    class="px-3 py-2 bg-gray-200 dark:bg-gray-700 rounded text-gray-800 dark:text-gray-200">
    🌙 / ☀️
</button>

        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Analytics Overview</h1>
            <button class="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700">
                Export Data
            </button>
        </div>

        <!-- STATS CARDS -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="p-6 bg-white rounded-lg shadow" data-aos="fade-up">
                <h3 class="text-gray-500">Active Users</h3>
                <p class="text-3xl font-bold">1,284</p>
            </div>

            <div class="p-6 bg-white rounded-lg shadow" data-aos="fade-up" data-aos-delay="150">
                <h3 class="text-gray-500">Tasks Completed</h3>
                <p class="text-3xl font-bold">8,492</p>
            </div>

            <div class="p-6 bg-white rounded-lg shadow" data-aos="fade-up" data-aos-delay="300">
                <h3 class="text-gray-500">API Usage</h3>
                <p class="text-3xl font-bold">32,900</p>
            </div>
        </div>

        <!-- CHARTS -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">

            <!-- LINE CHART -->
            <div class="bg-white p-6 rounded-lg shadow" data-aos="zoom-in">
                <h3 class="text-xl font-semibold mb-4">User Growth</h3>
                <canvas id="lineChart"></canvas>
            </div>

            <!-- BAR CHART -->
            <div class="bg-white p-6 rounded-lg shadow" data-aos="zoom-in" data-aos-delay="200">
                <h3 class="text-xl font-semibold mb-4">Task Volume</h3>
                <canvas id="barChart"></canvas>
            </div>

        </div>

    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();

        // Line Chart
        new Chart(document.getElementById("lineChart"), {
            type: "line",
            data: {
                labels: ["Jan", "Feb", "Mar", "Apr", "May", "Jun"],
                datasets: [{
                    label: "Users",
                    data: [200, 400, 650, 900, 1200, 1500],
                    borderColor: "#4f46e5",
                    tension: 0.4
                }]
            }
        });

        // Bar Chart
        new Chart(document.getElementById("barChart"), {
            type: "bar",
            data: {
                labels: ["Mon", "Tue", "Wed", "Thu", "Fri"],
                datasets: [{
                    label: "Tasks",
                    data: [1200, 900, 1500, 1800, 1300],
                    backgroundColor: "#6366f1"
                }]
            }
        });
    </script>

</body>
</html>
