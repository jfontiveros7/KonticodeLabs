<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-10">
    <header class="flex justify-between items-center mb-10">
        <h1 class="text-3xl font-bold">Dashboard</h1>
        <a href="/" class="px-4 py-2 bg-gray-700 rounded">Home</a>
    </header>

    <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-gray-800 p-6 rounded shadow">
            <h3 class="text-xl font-bold mb-2">Tasks Completed</h3>
            <p class="text-4xl font-bold">128</p>
        </div>

        <div class="bg-gray-800 p-6 rounded shadow">
            <h3 class="text-xl font-bold mb-2">Active Workflows</h3>
            <p class="text-4xl font-bold">12</p>
        </div>

        <div class="bg-gray-800 p-6 rounded shadow">
            <h3 class="text-xl font-bold mb-2">Errors</h3>
            <p class="text-4xl font-bold text-red-400">0</p>
        </div>
    </section>
</body>
</html>
