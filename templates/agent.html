<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <script>
    // Load theme from localStorage
    if (
        localStorage.theme === 'dark' ||
        (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)
    ) {
        document.documentElement.classList.add('dark')
    } else {
        document.documentElement.classList.remove('dark')
    }

    function toggleTheme() {
        const html = document.documentElement
        const isDark = html.classList.toggle('dark')
        localStorage.theme = isDark ? 'dark' : 'light'
    }
        
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 h-screen flex">

    <!-- SIDEBAR -->
    <button onclick="toggleTheme()" 
    class="px-3 py-2 bg-gray-200 dark:bg-gray-700 rounded text-gray-800 dark:text-gray-200">
    🌙 / ☀️
</button>

    <aside class="w-64 bg-white shadow-lg p-6">
        <h2 class="text-2xl font-bold text-indigo-600 mb-6">Agent Console</h2>

        <nav class="space-y-4">
            <a href="/" class="block text-gray-700 hover:text-indigo-600">🏠 Home</a>
            <a href="/agent" class="block text-indigo-600 font-semibold">🤖 Agent</a>
            <a href="#" class="block text-gray-700 hover:text-indigo-600">⚙️ Settings</a>
        </nav>
    </aside>

    <!-- MAIN PANEL -->
    <main class="flex-1 p-8 flex flex-col">

        <!-- CHAT WINDOW -->
        <div id="chat-window" class="flex-1 bg-white rounded-lg shadow p-6 overflow-y-auto">
            <p class="text-gray-500">Your AI agent is ready.</p>
        </div>

        <!-- INPUT BAR -->
        <form id="chat-form" class="mt-4 flex">
            <input 
                id="user-input"
                type="text"
                placeholder="Type a command..."
                class="flex-1 px-4 py-3 rounded-l-lg border border-gray-300 focus:outline-none"
            >
            <button 
                class="px-6 bg-indigo-600 text-white rounded-r-lg hover:bg-indigo-700"
            >
                Send
            </button>
        </form>

    </main>

</body>
</html>
