<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Konti Agent – Konticode Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'bounce-dot': 'bounceDot 1.2s infinite',
                        'slide-in':   'slideIn 0.3s ease-out',
                    },
                    keyframes: {
                        bounceDot: { '0%,80%,100%': { transform:'scale(0)' }, '40%': { transform:'scale(1)' } },
                        slideIn:   { '0%': { opacity:'0', transform:'translateY(12px)' }, '100%': { opacity:'1', transform:'translateY(0)' } },
                    }
                }
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        .chat-bubble { animation: slideIn 0.3s ease-out; }
        .dot1 { animation: bounceDot 1.2s infinite 0s; }
        .dot2 { animation: bounceDot 1.2s infinite 0.2s; }
        .dot3 { animation: bounceDot 1.2s infinite 0.4s; }
        @keyframes bounceDot { 0%,80%,100%{transform:scale(0);opacity:.3} 40%{transform:scale(1);opacity:1} }
        @keyframes slideIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        pre { white-space: pre-wrap; word-wrap: break-word; }
        .prose-dark code { background:#1e293b; padding:2px 6px; border-radius:4px; font-size:0.85em; }
    </style>
</head>

<body class="bg-gray-950 text-white flex h-screen overflow-hidden">

    <!-- ── Sidebar ── -->
    <aside class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col p-5 shrink-0">
        <div class="flex items-center gap-3 mb-8">
            <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center">
                <i class="fas fa-robot text-sm"></i>
            </div>
            <span class="font-bold text-lg">Konticode</span>
        </div>
        <nav class="space-y-1 flex-1">
            <a href="/" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition-colors">
                <i class="fas fa-home w-4"></i> Home
            </a>
            <a href="/agent" class="flex items-center gap-3 px-3 py-2 rounded-lg bg-indigo-600/20 text-indigo-300 border border-indigo-600/30">
                <i class="fas fa-comment-dots w-4"></i> Agent Chat
            </a>
            <a href="/dashboard" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition-colors">
                <i class="fas fa-chart-bar w-4"></i> Dashboard
            </a>
        </nav>
        <!-- Conversation starters -->
        <div class="mt-auto pt-4 border-t border-gray-800">
            <p class="text-xs text-gray-500 mb-2 uppercase tracking-wide">Quick prompts</p>
            <button onclick="quickPrompt('Generate a Python REST API with Flask')"
                    class="w-full text-left text-xs text-gray-400 hover:text-white px-2 py-1.5 rounded hover:bg-gray-800 transition-colors mb-1">
                <i class="fas fa-plus-circle text-indigo-400 mr-1"></i> Flask REST API
            </button>
            <button onclick="quickPrompt('Explain async/await in Python')"
                    class="w-full text-left text-xs text-gray-400 hover:text-white px-2 py-1.5 rounded hover:bg-gray-800 transition-colors mb-1">
                <i class="fas fa-plus-circle text-indigo-400 mr-1"></i> Async/Await
            </button>
            <button onclick="quickPrompt('Write a SQL query to find top 5 customers by revenue')"
                    class="w-full text-left text-xs text-gray-400 hover:text-white px-2 py-1.5 rounded hover:bg-gray-800 transition-colors">
                <i class="fas fa-plus-circle text-indigo-400 mr-1"></i> SQL query
            </button>
        </div>
    </aside>

    <!-- ── Main chat area ── -->
    <main class="flex-1 flex flex-col overflow-hidden">

        <!-- Header -->
        <header class="border-b border-gray-800 px-6 py-4 flex items-center justify-between bg-gray-900/50 backdrop-blur">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
                    <i class="fas fa-robot text-sm"></i>
                </div>
                <div>
                    <div class="font-semibold">Konti AI</div>
                    <div class="flex items-center gap-1.5 text-xs text-emerald-400">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                        Online · GPT-4o-mini
                    </div>
                </div>
            </div>
            <button onclick="clearChat()" class="text-xs text-gray-500 hover:text-white px-3 py-1.5 rounded border border-gray-700 hover:border-gray-500 transition-colors">
                <i class="fas fa-trash-alt mr-1"></i> Clear
            </button>
        </header>

        <!-- Messages -->
        <div id="chatBox" class="flex-1 overflow-y-auto px-6 py-6 space-y-5">
            <!-- Welcome message -->
            <div class="flex gap-3 chat-bubble">
                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shrink-0 mt-0.5">
                    <i class="fas fa-robot text-xs"></i>
                </div>
                <div class="bg-gray-800 rounded-2xl rounded-tl-sm px-4 py-3 max-w-2xl">
                    <p class="text-sm text-gray-100 leading-relaxed">
                        Hey, I'm <strong>Konti</strong>, your AI assistant. I can help you write code, explain concepts, debug issues, or answer any tech questions. What would you like to build today?
                    </p>
                </div>
            </div>
        </div>

        <!-- Typing indicator (hidden) -->
        <div id="typingIndicator" class="hidden px-6 pb-2">
            <div class="flex gap-3">
                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shrink-0">
                    <i class="fas fa-robot text-xs"></i>
                </div>
                <div class="bg-gray-800 rounded-2xl rounded-tl-sm px-4 py-3 flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-gray-400 dot1"></span>
                    <span class="w-2 h-2 rounded-full bg-gray-400 dot2"></span>
                    <span class="w-2 h-2 rounded-full bg-gray-400 dot3"></span>
                </div>
            </div>
        </div>

        <!-- Input bar -->
        <div class="border-t border-gray-800 px-6 py-4 bg-gray-900/50">
            <div class="flex gap-3 items-end max-w-4xl mx-auto">
                <textarea id="msgInput" rows="1"
                    class="flex-1 bg-gray-800 border border-gray-700 rounded-2xl px-4 py-3 text-sm
                           focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500
                           resize-none transition-all duration-200 leading-relaxed"
                    placeholder="Ask Konti anything… (Enter to send, Shift+Enter for new line)"></textarea>
                <button id="sendBtn"
                    class="w-11 h-11 bg-indigo-600 hover:bg-indigo-500 rounded-xl flex items-center justify-center
                           transition-colors duration-200 shrink-0 disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="fas fa-paper-plane text-sm"></i>
                </button>
            </div>
            <p class="text-xs text-gray-600 text-center mt-2">Nova can make mistakes. Verify important information.</p>
        </div>
    </main>

    <script>
        const chatBox    = document.getElementById("chatBox");
        const msgInput   = document.getElementById("msgInput");
        const sendBtn    = document.getElementById("sendBtn");
        const typingInd  = document.getElementById("typingIndicator");
        let history      = [];
        let isProcessing = false;

        // Auto-resize textarea
        msgInput.addEventListener("input", () => {
            msgInput.style.height = "auto";
            msgInput.style.height = Math.min(msgInput.scrollHeight, 150) + "px";
        });

        // Enter to send, Shift+Enter for newline
        msgInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        sendBtn.addEventListener("click", sendMessage);

        function quickPrompt(text) {
            msgInput.value = text;
            msgInput.dispatchEvent(new Event("input"));
            msgInput.focus();
        }

        function escapeHtml(str) {
            return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
        }

        function formatMessage(text) {
            // Format code blocks
            text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
                `<pre class="bg-gray-900 border border-gray-700 rounded-xl p-3 mt-2 mb-2 text-xs text-emerald-300 overflow-x-auto"><code>${escapeHtml(code.trim())}</code></pre>`
            );
            // Inline code
            text = text.replace(/`([^`]+)`/g, '<code class="bg-gray-900 px-1.5 py-0.5 rounded text-yellow-300 text-xs">$1</code>');
            // Bold
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            // Line breaks
            text = text.replace(/\n/g, '<br>');
            return text;
        }

        function appendMessage(role, content) {
            const isUser = role === "user";
            const div = document.createElement("div");
            div.className = "flex gap-3 chat-bubble" + (isUser ? " justify-end" : "");
            div.innerHTML = isUser
                ? `<div class="bg-indigo-600 rounded-2xl rounded-tr-sm px-4 py-3 max-w-2xl text-sm leading-relaxed">
                       ${formatMessage(escapeHtml(content))}
                   </div>
                   <div class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center shrink-0 mt-0.5 text-xs font-bold">
                       U
                   </div>`
                : `<div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shrink-0 mt-0.5">
                       <i class="fas fa-robot text-xs"></i>
                   </div>
                   <div class="bg-gray-800 rounded-2xl rounded-tl-sm px-4 py-3 max-w-2xl text-sm text-gray-100 leading-relaxed">
                       ${formatMessage(content)}
                   </div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const text = msgInput.value.trim();
            if (!text || isProcessing) return;

            isProcessing = true;
            sendBtn.disabled = true;
            msgInput.value = "";
            msgInput.style.height = "auto";

            appendMessage("user", text);
            history.push({ role: "user", content: text });

            typingInd.classList.remove("hidden");
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res  = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text, history })
                });
                const data = await res.json();

                typingInd.classList.add("hidden");

                if (data.reply) {
                    appendMessage("assistant", data.reply);
                    history.push({ role: "assistant", content: data.reply });
                } else {
                    appendMessage("assistant", `⚠️ Error: ${data.error || "Unknown error"}`);
                }
            } catch (err) {
                typingInd.classList.add("hidden");
                appendMessage("assistant", `⚠️ Network error: ${err.message}`);
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
                msgInput.focus();
            }
        }

        function clearChat() {
            history = [];
            chatBox.innerHTML = "";
            appendMessage("assistant", "Chat cleared! How can I help you?");
        }
    </script>
</body>
</html>
