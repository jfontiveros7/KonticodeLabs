<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Console</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white flex">
    <aside class="w-64 bg-gray-800 h-screen p-6">
        <h2 class="text-xl font-bold mb-6">Agent Console</h2>
        <nav class="space-y-4">
            <a href="/" class="block text-gray-300 hover:text-white">Home</a>
            <a href="/dashboard" class="block text-gray-300 hover:text-white">Dashboard</a>
        </nav>
    </aside>

    <main class="flex-1 p-10">
        <h1 class="text-3xl font-bold mb-6">Chat with Your Agent</h1>

        <div id="chatBox" class="bg-gray-800 p-6 rounded h-[60vh] overflow-y-auto mb-6"></div>

        <div class="flex gap-4">
            <input id="msg" class="flex-1 p-3 bg-gray-700 rounded" placeholder="Type a message..." />
            <button id="send" class="px-6 py-3 bg-blue-600 rounded">Send</button>
        </div>
    </main>

    <script>
        const chatBox = document.getElementById("chatBox");
        const msg = document.getElementById("msg");
        const send = document.getElementById("send");

        send.onclick = () => {
            if (!msg.value.trim()) return;
            chatBox.innerHTML += `<div class='mb-3'><strong>You:</strong> ${msg.value}</div>`;
            msg.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;
        };
    </script>
</body>
</html>
